name: Bug report
description: Report a reproducible defect in DiscoMCP.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Do not use this form for security vulnerabilities. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, branch, or commit SHA where the problem occurs.
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and its impact. Do not include credentials or private target data.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe, reproducible sequence of commands, configuration, and fixture data.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or output
      description: Remove secrets, access tokens, personal data, and raw private workspace samples before pasting.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed credentials and sensitive workspace content.
          required: true
