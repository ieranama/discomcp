name: Feature request
description: Propose a focused improvement to DiscoMCP.
title: "feature: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the user or operator problem, not only the preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe expected inputs, outputs, evidence, and failure behavior.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and privacy impact
      description: State whether the proposal affects target calls, data handling, reasoning context, or confirmation boundaries.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and documentation first.
          required: true
        - label: This request does not contain credentials or private workspace data.
          required: true
