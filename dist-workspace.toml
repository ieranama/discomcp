[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "npm"]
# Publish the npm installer under a scope so `npx @ieranama/discomcp` works
# and downloads the right prebuilt binary — zero Rust toolchain required.
npm-scope = "@ieranama"
# Auto-publish the npm package to the registry on each release tag.
# Requires an NPM_TOKEN secret on the GitHub repo.
publish-jobs = ["npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
