# Configure DiscoMCP against a real MCP server you control. Replace the
# command, arguments, documentation paths, and reasoning command below.
# Never commit a resolved API key; environment placeholders are resolved
# at runtime.

[targets.example]
transport = "stdio"
command = "npx"
args = ["-y", "example-mcp"]
docs = ["./docs/example-mcp.md"]

[targets.example.env]
EXAMPLE_API_KEY = "${EXAMPLE_API_KEY}"

[reasoning]
routing = "single"
everyday_backend = "primary"

[reasoning.backends.primary]
type = "command"
command = "some-agent-cli"
args = ["exec", "--model", "{model}"]
model = "your-configured-model"
input = "stdin_json"
output = "stdout_json"

[profiles]
privacy_mode = "balanced"
